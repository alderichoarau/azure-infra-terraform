name: Terraform CI
run-name: "CI · fmt + validate · ${{ github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read  # default minimal — jobs override as needed

jobs:
  # ── Validate ────────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint Init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: tflint
        run: tflint --recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security — Checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: cli
          soft_fail: false

  # ── Cost ─────────────────────────────────────────────────────────────────────
  cost:
    name: Cost — Infracost
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v7

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Cost breakdown
        env:
          ARM_USE_OIDC:        "true"
          ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          infracost breakdown \
            --path . \
            --terraform-var "owner=${{ secrets.AZURE_OWNER }}" \
            --terraform-var "resource_group_name=${{ secrets.AZURE_RG_NAME }}" \
            --format json \
            --out-file /tmp/infracost.json

      - name: Post PR comment
        uses: infracost/actions/comment@v3
        with:
          path: /tmp/infracost.json
          behavior: update
