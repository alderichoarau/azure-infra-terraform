name: Terraform Deploy
run-name: "Deploy · ${{ inputs.action }} · triggered by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to execute"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write  # OIDC token for Azure login
  contents: read

env:
  TF_VERSION:          "~> 1.9"
  ARM_USE_OIDC:        "true"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_WORKING_DIR:      terraform

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      # ── Setup ────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup Infracost
        if: inputs.action == 'plan'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Init & Validate ───────────────────────────────────────────────────────
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="use_oidc=true" \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ secrets.AZURE_OWNER }}.terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      # ── Plan ─────────────────────────────────────────────────────────────────
      - name: Terraform Plan
        if: inputs.action == 'plan'
        run: |
          terraform plan \
            -var="owner=${{ secrets.AZURE_OWNER }}" \
            -var="resource_group_name=${{ secrets.AZURE_RG_NAME }}" \
            -out=tfplan \
            -no-color

      - name: Infracost Cost Estimate
        if: inputs.action == 'plan'
        run: |
          terraform show -json tfplan > tfplan.json
          infracost breakdown \
            --path tfplan.json \
            --format json \
            --out-file infracost.json
          infracost output \
            --path infracost.json \
            --format table \
            | tee infracost-summary.txt

      - name: Upload Cost Artifacts
        if: inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: infracost-${{ github.run_id }}
          path: |
            terraform/infracost.json
            terraform/infracost-summary.txt
          retention-days: 30

      # ── Apply ─────────────────────────────────────────────────────────────────
      - name: Terraform Apply
        if: inputs.action == 'apply'
        run: |
          terraform apply \
            -var="owner=${{ secrets.AZURE_OWNER }}" \
            -var="resource_group_name=${{ secrets.AZURE_RG_NAME }}" \
            -auto-approve

      # ── Destroy ───────────────────────────────────────────────────────────────
      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="owner=${{ secrets.AZURE_OWNER }}" \
            -var="resource_group_name=${{ secrets.AZURE_RG_NAME }}" \
            -auto-approve

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Job Summary
        if: always()
        run: |
          echo "## Terraform Deploy — ${{ inputs.action }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Owner**  : ${{ secrets.AZURE_OWNER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch** : ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**  : @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
