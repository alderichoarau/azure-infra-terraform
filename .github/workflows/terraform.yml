name: Terraform Deploy
run-name: "Deploy · ${{ inputs.action }} · triggered by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to execute"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  id-token: write  # OIDC token for Azure login
  contents: read

env:
  ARM_USE_OIDC:        "true"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_WORKING_DIR:      terraform

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="use_oidc=true" \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RG }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ secrets.AZURE_OWNER }}.terraform.tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      # ── Plan (workflow_dispatch plan) ─────────────────────────────────────────
      - name: Terraform Plan
        if: inputs.action == 'plan'
        run: |
          terraform plan \
            -var="owner=${{ secrets.AZURE_OWNER }}" \
            -var="resource_group_name=${{ secrets.AZURE_RG_NAME }}" \
            -out=tfplan \
            -no-color

      - name: Setup Infracost
        if: inputs.action == 'plan'
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Infracost — Cost estimate
        if: inputs.action == 'plan'
        run: |
          terraform show -json tfplan > tfplan.json
          infracost breakdown \
            --path tfplan.json \
            --format json \
            --out-file infracost.json
          infracost output \
            --path infracost.json \
            --format table \
            | tee infracost-summary.txt

      - name: Upload cost artifacts
        if: inputs.action == 'plan'
        uses: actions/upload-artifact@v4
        with:
          name: infracost-${{ github.run_id }}
          path: |
            terraform/infracost.json
            terraform/infracost-summary.txt
          retention-days: 30

      # ── Apply (workflow_dispatch apply) ───────────────────────────────────────
      - name: Terraform Apply
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || inputs.action == 'apply'
        run: |
          terraform apply \
            -var="owner=${{ secrets.AZURE_OWNER }}" \
            -var="resource_group_name=${{ secrets.AZURE_RG_NAME }}" \
            -auto-approve

      # ── Destroy (workflow_dispatch destroy only) ───────────────────────────
      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        run: |
          terraform destroy \
            -var="owner=${{ secrets.AZURE_OWNER }}" \
            -var="resource_group_name=${{ secrets.AZURE_RG_NAME }}" \
            -auto-approve

      - name: Summary
        if: always()
        run: |
          echo "## Terraform — ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Owner** : ${{ secrets.AZURE_OWNER }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch** : ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Action** : ${{ github.event_name == 'pull_request' && 'plan' || inputs.action || 'apply' }}" >> $GITHUB_STEP_SUMMARY
